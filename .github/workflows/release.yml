name: Release

# Runs on every push to main. Knope decides if there's anything to release
# (no-op when there are no `feat:` / `fix:` / breaking commits since the last
# tag). When there is, it bumps versions, updates CHANGELOG.md, commits,
# tags, and creates the GitHub release — which then fires `release: created`
# and triggers build.yml.
#
# Why RELEASE_PAT instead of the workflow's default GITHUB_TOKEN: events
# created by GITHUB_TOKEN don't trigger downstream workflows (GitHub's anti-
# recursion safeguard), so a knope-created release wouldn't fire build.yml.
# Using a personal access token bypasses that — releases get created under
# the PAT owner's identity and downstream workflows fire normally.

on:
  push:
    branches: [main]

# Don't run two releases in parallel. The `cancel-in-progress: false` keeps
# the in-flight one going so we don't end up with a half-applied tag.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # knope needs full history to read prior tags + commits
          # Use the PAT for the persisted credentials too — knope's Command
          # step runs `git push`, which needs to push under the same identity
          # that's going to create the release a couple of steps later.
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: knope-dev/action@v2.1.2
        with:
          version: 0.21.0
          # knope-dev/action exports its `github-token` input as the
          # GH_TOKEN env var that knope itself reads when calling the
          # GitHub API. Default is github.token (the workflow's
          # GITHUB_TOKEN), which creates the release but doesn't fire
          # downstream workflows (anti-recursion). Passing the PAT
          # here is what makes release.created actually trigger
          # build.yml.
          github-token: ${{ secrets.RELEASE_PAT }}

      - name: Run release workflow
        env:
          # Shadows the workflow's default GITHUB_TOKEN. Knope reads the env
          # var by that name regardless of what's actually stored there, so
          # passing the PAT here is enough to make the resulting release
          # event downstream-triggering.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        # knope's PrepareRelease step exits with code 1 (error
        # `releases::no_release`) when no commit since the last tag is
        # release-worthy — chore/docs/style/refactor/test/ci all trip this.
        # We treat that exit specifically as "no work to do" rather than a
        # red X, since the job is genuinely allowed to be a no-op.
        run: |
          set +e
          output=$(knope release 2>&1)
          code=$?
          echo "$output"
          if [ $code -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -q "releases::no_release"; then
            echo "::notice::No release-worthy commits since last tag; skipping."
            exit 0
          fi
          exit $code

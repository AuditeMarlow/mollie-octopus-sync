name: Build installers

# When knope creates a GitHub release, build the Tauri installers for each
# platform in the matrix and upload them (plus the updater `latest.json`)
# as assets on that release.

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for the updater: signs the installers with the keypair
          # generated via `tauri signer generate`. Without these the build
          # still succeeds, but the produced `latest.json` won't pass the
          # signature check baked into the installed app.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Attach to the release that triggered this workflow.
          releaseId: ${{ github.event.release.id }}
          # Generate the updater manifest (`latest.json`) and upload it too.
          includeUpdaterJson: true
          args: --target ${{ matrix.rust-target }}

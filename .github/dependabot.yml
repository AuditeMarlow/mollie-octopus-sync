version: 2
updates:
  # Frontend deps + tooling (React, Vite, ESLint, Prettier, Vitest, Tauri JS APIs).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Rust deps for the Tauri shell (tauri, plugins, keyring, reqwest transitively).
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # keyring v4 is "sample code only" per the upstream README — the real
      # library lives in `keyring-core` + backend crates now. Migrating is
      # a real rewrite we don't want forced on us by a dependabot PR.
      - dependency-name: "keyring"
        update-types: ["version-update:semver-major"]

  # CI actions (checkout, setup-node, tauri-action, rust-toolchain, rust-cache).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Mollie to EmailOctopus Sync">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Indigo gradient backdrop -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <!-- M (Mollie) - 280px tall centerline, matches the O -->
  <path d="M 122 650 L 122 370 L 242 510 L 362 370 L 362 650"
        fill="none" stroke="#FFFFFF" stroke-width="72"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Amber arrow sitting in the gap, not touching either letter -->
  <path d="M 416 490 L 496 490 L 496 460 L 566 510 L 496 560 L 496 530 L 416 530 Z"
        fill="#FBBF24"/>

  <!-- O (EmailOctopus) - r=140 with same stroke as M -->
  <circle cx="762" cy="510" r="140"
          fill="none" stroke="#FFFFFF" stroke-width="72"/>
</svg>
